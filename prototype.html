function toRomaji(w) {
  if (!/[\u3040-\u309f]/.test(w)) return w.toLowerCase();
  let r = '';
  for (const c of w) r += (ROMAJI_MAP[c] || c);
  return r;
}

// ═══════════════════════════════════════════════
// SVG: STICK FIGURE HERO
// ═══════════════════════════════════════════════
function StickFigure({ weapon='wooden', armor='hat', pose='idle', color='#1A237E', animStyle={} }) {
  const lw = 3.8;
  const cx = 58;
  const headCy = 22;
  const headR = 17;
  const bodyTop = 40;
  const bodyBot = 84;
  const shY = 54;

  const poseArms = {
    idle:    { r:[cx+22, shY+24], l:[cx-22, shY+24] },
    attack:  { r:[cx+42, shY-8],  l:[cx-16, shY+22] },
    victory: { r:[cx+20, headCy-10], l:[cx-20, headCy-10] },
    scratch: { r:[cx+14, headCy+6], l:[cx-24, shY+24] },
  };
  const {r:ra, l:la} = poseArms[pose] || poseArms.idle;
  const llEnd = [cx-20, bodyBot+34];
  const rlEnd = [cx+20, bodyBot+34];

  const sLen = 30;
  const sAngle = pose === 'attack' ? 0 : -0.35;
  const sTip = [ra[0] + sLen * Math.cos(sAngle), ra[1] + sLen * Math.sin(sAngle)];
  const s = { stroke: color, strokeWidth: lw, strokeLinecap: 'round', strokeLinejoin: 'round' };

  return (
    <g style={animStyle}>
      {armor === 'cape' && (
        <polygon points={`${cx-5},${bodyTop+8} ${cx-32},${bodyBot+8} ${cx+32},${bodyBot+8} ${cx+5},${bodyTop+8}`}
          fill="#7B1FA2" opacity={0.82} />
      )}
      <circle cx={cx} cy={headCy} r={headR} fill="none" {...s} />
      <line x1={cx} y1={bodyTop} x2={cx} y2={bodyBot} {...s} />
      <line x1={cx} y1={shY} x2={la[0]} y2={la[1]} {...s} />
      <line x1={cx} y1={shY} x2={ra[0]} y2={ra[1]} {...s} />
      <line x1={cx} y1={bodyBot} x2={llEnd[0]} y2={llEnd[1]} {...s} />
      <line x1={cx} y1={bodyBot} x2={rlEnd[0]} y2={rlEnd[1]} {...s} />
      {weapon === 'wooden' && (
        <line x1={ra[0]} y1={ra[1]} x2={sTip[0]} y2={sTip[1]} stroke="#8B6914" strokeWidth={lw*0.85} strokeLinecap="round" />
      )}
      {weapon === 'iron' && (<>
        <line x1={ra[0]} y1={ra[1]} x2={sTip[0]} y2={sTip[1]} stroke="#9E9E9E" strokeWidth={lw*1.1} strokeLinecap="round" />
        <line x1={ra[0]} y1={ra[1]} x2={sTip[0]} y2={sTip[1]} stroke="rgba(255,255,255,0.55)" strokeWidth={lw*0.3} strokeLinecap="round" />
      </>)}
      {weapon === 'flame' && (<>
        <line x1={ra[0]} y1={ra[1]} x2={sTip[0]} y2={sTip[1]} stroke="#FF6B35" strokeWidth={lw*1.15} strokeLinecap="round" />
        <circle cx={sTip[0]} cy={sTip[1]} r={8} fill="#FF9500" opacity={0.85} />
        <circle cx={sTip[0]} cy={sTip[1]} r={4.5} fill="#FFE034" opacity={0.95} />
      </>)}
      {armor === 'helmet' && (
        <path d={`M ${cx-headR-3} ${headCy+4} A ${headR+3} ${headR+3} 0 0 1 ${cx+headR+3} ${headCy+4} L ${cx+headR+5} ${headCy+12} L ${cx-headR-5} ${headCy+12} Z`}
          fill="#9E9E9E" stroke="#616161" strokeWidth={2} />
      )}
      {armor === 'hat' && (
        <polygon points={`${cx},${headCy-headR-18} ${cx-16},${headCy-headR+1} ${cx+16},${headCy-headR+1}`}
          fill="#FFD700" stroke="#F9A825" strokeWidth={1.5} />
      )}
    </g>
  );
}

// CONFETTI
// ═══════════════════════════════════════════════
function Confetti() {
  const pieces = [];
  const colors = ['#FFD700','#FF5252','#5BB8FF','#4CAF50','#FF9800','#E040FB','#00BCD4'];
  for (let i = 0; i < 48; i++) {
    const left = Math.random() * 100;
    const delay = Math.random() * 1.5;
    const dur = 2 + Math.random() * 1.5;
    const size = 8 + Math.random() * 12;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = Math.random() > 0.5 ? '50%' : '2px';
    pieces.push(
      <div key={i} style={{
        position: 'absolute', left: `${left}%`, top: 0,
        width: size, height: size, background: color, borderRadius: shape,
        animation: `confetti-fall ${dur}s ease-in forwards`,
        animationDelay: `${delay}s`, opacity: 0,
      }} />
    );
  }
  return <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>{pieces}</div>;
}

}

// BATTLE SCREEN
// ═══════════════════════════════════════════════
function BattleScreen({ stageId, gameState, onComplete, onEscape }) {
  const stage = STAGES[stageId];
  const words = React.useMemo(() => {
    const w = [...stage.words];
    for (let i = w.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [w[i],w[j]]=[w[j],w[i]]; }
    return w;
  }, [stageId]);

  const [wordIdx, setWordIdx] = useState(0);
  const [input, setInput] = useState('');
  const [missFlash, setMissFlash] = useState(false);
  const [heroAnim, setHeroAnim] = useState('idle');
  const [enemyFlash, setEnemyFlash] = useState(false);
  const [dmgDisplay, setDmgDisplay] = useState(null);
  const [enemyHP, setEnemyHP] = useState(stage.enemyMaxHP);
  const [defeated, setDefeated] = useState(0);
  const [enemyFalling, setEnemyFalling] = useState(false);
  const [total, setTotal] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [showGuide, setShowGuide] = useState(true);
  const [coinPops, setCoinPops] = useState([]);

  const weaponAtk = WEAPONS.find(w => w.id === gameState.weapon)?.atk || 1;
  const armorBonus = ARMORS.find(a => a.id === gameState.armor)?.bonus || 0;

  const ref = useRef({});
  ref.current = { wordIdx, input, total, correct, enemyHP, defeated, enemyFalling, heroAnim, words, missFlash };

  const onCompleteRef = useRef(onComplete);
  onCompleteRef.current = onComplete;

  useEffect(() => {
    const handler = (e) => {
      if (e.key.length !== 1) return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      const r = ref.current;
      if (r.heroAnim.startsWith('attack') || r.enemyFalling) return;

      const w = r.words[r.wordIdx % r.words.length];
      const romaji = toRomaji(w);
      const expected = romaji[r.input.length];

      setTotal(t => t + 1);

      if (e.key.toLowerCase() === expected?.toLowerCase()) {
        setCorrect(c => c + 1);
        const newInput = r.input + e.key.toLowerCase();
        setInput(newInput);

        if (newInput.length >= romaji.length) {
          // 最後の文字を表示したまま少し待ってから次へ進む
          const patterns = ['attack1','attack2','attack3'];
          setHeroAnim(patterns[Math.floor(Math.random()*3)]);
          const dmg = weaponAtk;

          setTimeout(() => {
            setEnemyFlash(true);
            setDmgDisplay({ val: dmg, ts: Date.now() });

            setTimeout(() => {
              setEnemyFlash(false);
              const r2 = ref.current;
              const newHP = r2.enemyHP - dmg;

              if (newHP <= 0) {
                setEnemyHP(0);
                setEnemyFalling(true);

                // Coin pops
                const pops = Array.from({length:4}, (_,i) => ({id:i,dx:(Math.random()-0.5)*80,dy:-40-Math.random()*40}));
                setCoinPops(pops);
                setTimeout(() => setCoinPops([]), 900);

                setTimeout(() => {
                  const nd = r2.defeated + 1;
                  setDefeated(nd);
                  setEnemyFalling(false);
                  setEnemyHP(stage.enemyMaxHP);
                  setHeroAnim('idle');
                  // 入力クリア＆次の単語へ
                  setInput('');
                  setWordIdx(i => i + 1);

                  if (nd >= stage.enemyCount) {
                    const r3 = ref.current;
                    const acc = r3.total > 0 ? Math.round(r3.correct / r3.total * 100) : 100;
                    const coins = Math.round(stage.coinReward * (1 + armorBonus));
                    onCompleteRef.current({ accuracy: acc, defeated: nd, coins, stageId });
                  }
                }, 620);
              } else {
                setEnemyHP(newHP);
                setHeroAnim('idle');
                // 入力クリア＆次の単語へ（少し遅らせて最後の文字を見せる）
                setTimeout(() => {
                  setInput('');
                  setWordIdx(i => i + 1);
                }, 180);
              }
            }, 240);
          }, 140);
        }
      } else {
        if (!r.missFlash) {
          setMissFlash(true);
          setTimeout(() => setMissFlash(false), 320);
        }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [weaponAtk, armorBonus, stageId, stage]);

  const currentWord = words[wordIdx % words.length];
  const romaji = toRomaji(currentWord);
  const nextChar = romaji[input.length]?.toUpperCase();
  const accuracy = total > 0 ? Math.round(correct / total * 100) : 100;
  const isHira = /[\u3040-\u309f]/.test(currentWord);
  const hpPct = (enemyHP / stage.enemyMaxHP) * 100;
  const hpColor = hpPct > 60 ? '#4CAF50' : hpPct > 30 ? '#FF9800' : '#FF5252';

  const availKeys = new Set(stage.availableKeys.toUpperCase().split(''));

  return (
    <div className="screen" style={{ background:'#FFF9E6', display:'flex', flexDirection:'column', fontFamily:"'Noto Sans JP',sans-serif" }}>
      {/* Status bar */}
      <div style={{ height:48, background:'linear-gradient(90deg,#1A237E,#283593)', display:'flex', alignItems:'center', padding:'0 24px', gap:20, color:'white', fontSize:15, fontWeight:700 }}>
        <button onClick={onEscape} style={{ background:'rgba(255,255,255,0.15)', border:'none', color:'white', padding:'4px 14px', borderRadius:8, cursor:'pointer', fontSize:13, fontWeight:700 }}>← もどる</button>
        <span>📍 ステージ {stageId}</span>
        <span style={{ color: accuracy >= 85 ? '#69F0AE' : accuracy >= 70 ? '#FFD700' : '#FF5252' }}>
          精度: {accuracy}%
        </span>
        <span>💥 撃破: {defeated}/{stage.enemyCount}</span>
        <span style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:6 }}>
          <span style={{ fontSize:13, opacity:0.7 }}>💰</span>
          <span style={{ color:'#FFD700' }}>{gameState.coins}</span>
        </span>
      </div>

      {/* Battle zone */}
      <div style={{ flex:'0 0 260px', display:'flex', position:'relative' }}>
        {/* Divider */}
        <div style={{ position:'absolute', left:'50%', top:10, bottom:10, width:2, background:'rgba(26,35,126,0.08)', borderRadius:2 }}/>

        {/* Hero area */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', paddingBottom:18, position:'relative' }}>
          <div style={{ position:'absolute', top:14, left:16, right:8, fontSize:13, color:'#546E7A', fontWeight:700 }}>
            あなたのゆうしゃ ⚔️
          </div>
          {(() => {
            const attackCSS = { attack1:'attack-lunge 0.42s ease-out', attack2:'attack-spin 0.5s ease-out', attack3:'attack-jump 0.52s ease-out' };
            const isAttacking = heroAnim.startsWith('attack');
            const heroPose = heroAnim === 'attack3' ? 'victory' : isAttacking ? 'attack' : 'idle';
            return (
              <div style={{ animation: isAttacking ? attackCSS[heroAnim] : undefined }}>
                <svg width={140} height={170} viewBox="0 0 120 160" style={{ overflow:'visible' }}>
                  <StickFigure weapon={gameState.weapon} armor={gameState.armor} pose={heroPose}
                    animStyle={ !isAttacking ? { animation:'idle-bob 2s ease-in-out infinite' } : {} } />
                </svg>
              </div>
            );
          })()}
          {heroAnim.startsWith('attack') && (
            <div style={{ position:'absolute', top:90, right:30, fontSize:24, animation:'dmg-float 0.5s ease-out forwards', pointerEvents:'none' }}>⚡</div>
          )}
        </div>

        {/* Enemy area */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', paddingBottom:18, position:'relative' }}>
          <div style={{ position:'absolute', top:14, left:8, right:16, fontSize:13, color:'#546E7A', fontWeight:700, textAlign:'right' }}>
            てき {defeated + 1}/{stage.enemyCount}
          </div>
          {/* HP bar */}
          <div style={{ position:'absolute', top:34, left:20, right:20 }}>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, color:'#546E7A', fontWeight:700, marginBottom:4 }}>
              <span>HP</span><span>{Math.max(0,enemyHP)}/{stage.enemyMaxHP}</span>
            </div>
            <div style={{ height:16, background:'#E0E0E0', borderRadius:8, overflow:'hidden', boxShadow:'inset 0 2px 4px rgba(0,0,0,0.12)' }}>
              <div style={{ height:'100%', width:`${hpPct}%`, background:`linear-gradient(90deg,${hpColor},${hpColor}cc)`,
                borderRadius:8, transition:'width 0.25s ease-out', boxShadow:`0 0 8px ${hpColor}66` }}/>
            </div>
          </div>

          <div style={{ position:'relative' }}>
            <svg width={160} height={175} viewBox="0 0 140 160" style={{ overflow:'visible' }}>
              <EnemySVG type={stage.enemyType} flash={enemyFlash} falling={enemyFalling} />
            </svg>
            {/* Damage display */}
            {dmgDisplay && (
              <div key={dmgDisplay.ts} style={{
                position:'absolute', top:20, right:-10, fontSize:32, fontWeight:900, color:'#FF5252',
                textShadow:'2px 2px 0 rgba(0,0,0,0.2)', animation:'dmg-float 0.6s ease-out forwards',
                pointerEvents:'none', fontFamily:"'Noto Sans JP',sans-serif",
              }}>-{dmgDisplay.val}</div>
            )}
            {/* Coin pops */}
            {coinPops.map(p => (
              <div key={p.id} style={{
                position:'absolute', top:'50%', left:'50%', fontSize:20,
                animation:'dmg-float 0.8s ease-out forwards',
                animationDelay:`${p.id*0.08}s`, opacity:0,
                transform:`translate(${p.dx}px,${p.dy}px)`,
                pointerEvents:'none',
              }}>💰</div>
            ))}
          </div>
        </div>
      </div>

      {/* Question area */}
      <div style={{ flex:'0 0 148px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        borderTop:'3px solid rgba(26,35,126,0.08)', position:'relative',
        background: missFlash ? undefined : 'rgba(26,35,126,0.015)',
        animation: missFlash ? 'miss-flash 0.32s ease-out' : undefined }}>

        {/* Word display */}
        {isHira ? (
          <div style={{ textAlign:'center', marginBottom:8 }}>
            <div style={{ fontSize:52, fontWeight:900, color:'#1A237E', letterSpacing:6, lineHeight:1 }}>{currentWord}</div>
            <div style={{ fontSize:22, color:'#90A4AE', fontWeight:700, letterSpacing:3, marginTop:4 }}>{romaji}</div>
          </div>
        ) : (
          <div style={{ fontSize:54, fontWeight:900, color:'#1A237E', letterSpacing:4, marginBottom:10, lineHeight:1 }}>
            {currentWord}
          </div>
        )}

        {/* Progress indicators */}
        <div style={{ display:'flex', gap:8 }}>
          {romaji.split('').map((ch, i) => (
            <div key={i} style={{
              width:38, height:38, borderRadius:8, border:'3px solid',
              borderColor: i < input.length ? '#5BB8FF' : '#D0D0D0',
              background: i < input.length ? '#5BB8FF' : 'white',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:17, fontWeight:900, color: i < input.length ? 'white' : '#B0BEC5',
              fontFamily:'Courier New, monospace', transition:'all 0.1s',
              boxShadow: i < input.length ? '0 2px 8px rgba(91,184,255,0.4)' : 'none',
            }}>
              {i < input.length ? ch.toUpperCase() : ''}
            </div>
          ))}
        </div>
      </div>

      {/* Keyboard guide */}
      <div style={{ flex:1, background:'linear-gradient(to bottom,#ECEFF1,#E0E3E8)', padding:'8px 24px 10px', borderTop:'2px solid rgba(26,35,126,0.1)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
          <span style={{ fontSize:13, color:'#546E7A', fontWeight:700 }}>⌨️ キーボードガイド</span>
          <button onClick={() => setShowGuide(g => !g)}
            style={{ fontSize:12, padding:'3px 12px', borderRadius:6, border:'1.5px solid #B0BEC5', background:'white', cursor:'pointer', color:'#546E7A', fontWeight:700 }}>
            {showGuide ? 'かくす' : 'みせる'}
          </button>
        </div>
        {showGuide && (
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {KB_ROWS.map((row, ri) => (
              <div key={ri} style={{ display:'flex', gap:5, justifyContent:'center', marginLeft:ri===1?20:ri===2?36:0 }}>
                {row.map(k => {
                  const isNext = nextChar === k;
                  const isAvail = availKeys.has(k);
                  return (
                    <div key={k} style={{
                      width:42, height:42, borderRadius:8,
                      background: isNext ? '#FFD700' : isAvail ? '#5BB8FF' : '#CFD8DC',
                      color: isNext ? '#1A237E' : isAvail ? 'white' : '#90A4AE',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:14, fontWeight:900, fontFamily:'Courier New,monospace',
                      boxShadow: isNext ? '0 3px 0 #F9A825, 0 0 12px rgba(255,215,0,0.5)' : isAvail ? '0 3px 0 #1976D2' : '0 2px 0 #B0BEC5',
                      border: isNext ? '2px solid #F9A825' : '2px solid transparent',
                      transition:'all 0.1s',
                      animation: isNext ? 'glow-pulse 1s ease-in-out infinite' : undefined,
                    }}>
                      {k}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// STAGE CLEAR SCREEN
// ═══════════════════════════════════════════════
function StageClearScreen({ result, gameState, onNext, onRetry, onWorldMap }) {
  const { accuracy, defeated, coins, stageId } = result;
  const stars = accuracy >= 95 ? 3 : accuracy >= 85 ? 2 : accuracy >= 70 ? 1 : 0;
  const cleared = stars > 0;
  const [displayCoins, setDisplayCoins] = useState(0);

  const onNextRef = useRef(onNext); onNextRef.current = onNext;
  const onRetryRef = useRef(onRetry); onRetryRef.current = onRetry;
  const onWorldMapRef = useRef(onWorldMap); onWorldMapRef.current = onWorldMap;

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'a') onRetryRef.current();
      if (e.key === 'm') onWorldMapRef.current();
      if (e.key === 'n' && cleared) onNextRef.current();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [cleared]);

  useEffect(() => {
    if (!cleared) return;
    let n = 0;
    const step = Math.ceil(coins / 30);
    const iv = setInterval(() => {
      n = Math.min(n + step, coins);
      setDisplayCoins(n);
      if (n >= coins) clearInterval(iv);
    }, 40);
    return () => clearInterval(iv);
  }, [coins, cleared]);

  if (!cleared) {
    return (
      <div className="screen" style={{ background:'linear-gradient(135deg,#FFF9E6,#FFF3CD)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontFamily:"'Noto Sans JP',sans-serif" }}>
        <div style={{ fontSize:54, marginBottom:20 }}>😅</div>
        <div style={{ fontSize:38, fontWeight:900, color:'#E65100', marginBottom:8, animation:'slide-up 0.4s ease-out' }}>
          もうすこし！
        </div>
        <div style={{ fontSize:20, color:'#5D4037', marginBottom:32 }}>またれんしゅうしよう！</div>
        <div style={{ background:'white', borderRadius:20, padding:'28px 48px', textAlign:'center', boxShadow:'0 8px 30px rgba(0,0,0,0.12)', marginBottom:32, animation:'slide-up 0.5s ease-out' }}>
          <div style={{ fontSize:18, color:'#546E7A', marginBottom:6 }}>せいかくさ</div>
          <div style={{ fontSize:48, fontWeight:900, color:'#FF5252' }}>{accuracy}%</div>
          <div style={{ fontSize:15, color:'#78909C', marginTop:4 }}>70%以上でクリア！</div>
        </div>
        <div style={{ display:'flex', gap:20 }}>
          <button onClick={onWorldMap} style={{ padding:'14px 28px', fontSize:17, borderRadius:14, border:'2px solid #E0E0E0', background:'white', color:'#546E7A', cursor:'pointer', fontWeight:700 }}>
            マップにもどる <kbd style={{fontSize:12,background:'#F0F0F0',border:'1px solid #CCC',borderRadius:4,padding:'1px 6px'}}>M</kbd>
          </button>
          <button onClick={onRetry} style={{ padding:'16px 44px', fontSize:22, fontWeight:900, background:'#FFD700', color:'#1A237E', border:'none', borderRadius:16, cursor:'pointer', boxShadow:'0 5px 0 #F9A825' }}>
            🔄 もう一度！ <kbd style={{fontSize:13,background:'rgba(0,0,0,0.12)',border:'1px solid rgba(0,0,0,0.15)',borderRadius:4,padding:'1px 6px',marginLeft:2}}>A</kbd>
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="screen" style={{ background:'linear-gradient(135deg,#E8F5E9,#DCEDC8)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontFamily:"'Noto Sans JP',sans-serif", position:'relative', overflow:'hidden' }}>
      <Confetti />

      <div style={{ fontSize:58, marginBottom:8, animation:'slide-up 0.3s ease-out' }}>🎉</div>
      <div style={{ fontSize:44, fontWeight:900, color:'#1A237E', marginBottom:6, animation:'slide-up 0.35s ease-out', textShadow:'3px 3px 0 rgba(255,255,255,0.6)' }}>
        ステージクリア！
      </div>

      {/* Hero victory */}
      <div style={{ animation:'idle-bob 2s ease-in-out infinite', marginBottom:8 }}>
        <svg width={120} height={140} viewBox="0 0 120 160" style={{ overflow:'visible' }}>
          <StickFigure weapon={gameState.weapon} armor={gameState.armor} pose="victory" />
        </svg>
      </div>

      {/* Results */}
      <div style={{ background:'white', borderRadius:24, padding:'26px 52px', textAlign:'center', boxShadow:'0 10px 40px rgba(0,0,0,0.15)', animation:'slide-up 0.45s ease-out', minWidth:380 }}>
        {/* Stars */}
        <div style={{ display:'flex', gap:10, justifyContent:'center', marginBottom:18 }}>
          {[1,2,3].map(s => (
            <span key={s} style={{ fontSize:44, filter: stars >= s ? 'none' : 'grayscale(1) opacity(0.25)',
              animation: stars >= s ? `star-pop 0.4s ease-out forwards` : 'none',
              animationDelay: `${(s-1)*0.15}s`, opacity: stars >= s ? 0 : 0.25 }}>⭐</span>
          ))}
        </div>
        <div style={{ display:'flex', gap:32, justifyContent:'center', marginBottom:18 }}>
          <div>
            <div style={{ fontSize:13, color:'#78909C', marginBottom:2 }}>せいかくさ</div>
            <div style={{ fontSize:36, fontWeight:900, color:'#1A237E' }}>{accuracy}%</div>
          </div>
          <div style={{ width:2, background:'#E0E0E0', borderRadius:2 }}/>
          <div>
            <div style={{ fontSize:13, color:'#78909C', marginBottom:2 }}>たおした</div>
            <div style={{ fontSize:36, fontWeight:900, color:'#1A237E' }}>{defeated}/{STAGES[stageId]?.enemyCount}</div>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontSize:28, fontWeight:900, color:'#F57F17' }}>
          <span style={{ fontSize:32 }}>💰</span>
          <span style={{ animation: displayCoins < coins ? 'coin-bounce 0.2s ease-in-out infinite' : 'none' }}>+{displayCoins}</span>
        </div>
      </div>

      <div style={{ display:'flex', gap:20, marginTop:28 }}>
        <button onClick={onRetry}
          style={{ padding:'12px 24px', fontSize:17, borderRadius:14, border:'2px solid #E0E0E0', background:'white', color:'#546E7A', cursor:'pointer', fontWeight:700 }}>
          🔄 もう一度 <kbd style={{fontSize:12,background:'#F0F0F0',border:'1px solid #CCC',borderRadius:4,padding:'1px 6px'}}>A</kbd>
        </button>
        <button onClick={onWorldMap}
          style={{ padding:'12px 24px', fontSize:17, borderRadius:14, border:'2px solid #E0E0E0', background:'white', color:'#546E7A', cursor:'pointer', fontWeight:700 }}>
          🗺️ マップ <kbd style={{fontSize:12,background:'#F0F0F0',border:'1px solid #CCC',borderRadius:4,padding:'1px 6px'}}>M</kbd>
        </button>
        <button onClick={onNext}
          style={{ padding:'14px 44px', fontSize:22, fontWeight:900, background:'linear-gradient(135deg,#FFD700,#FFA000)', color:'#1A237E', border:'none', borderRadius:16, cursor:'pointer', boxShadow:'0 5px 0 #F9A825,0 8px 20px rgba(255,160,0,0.35)', transition:'transform 0.1s' }}>
          つぎへ → <kbd style={{fontSize:13,background:'rgba(0,0,0,0.12)',border:'1px solid rgba(0,0,0,0.15)',borderRadius:4,padding:'1px 6px',marginLeft:4}}>N</kbd>
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// SHOP SCREEN
// ═══════════════════════════════════════════════
function ShopScreen({ gameState, setGameState, onClose }) {
  const [msg, setMsg] = useState('');
  const [msgKey, setMsgKey] = useState(0);

  const showMsg = (text) => { setMsg(text); setMsgKey(k=>k+1); setTimeout(()=>setMsg(''),2000); };

  const buy = (type, item) => {
    if (gameState.coins < item.cost) { showMsg('コインがたりない…'); return; }
    setGameState(gs => {
      const ownedKey = type === 'weapon' ? 'ownedWeapons' : 'ownedArmors';
      const equipped = type === 'weapon' ? item.id : gs.armor;
      const newOwned = gs[ownedKey].includes(item.id) ? gs[ownedKey] : [...gs[ownedKey], item.id];
      return {
        ...gs, coins: gs.coins - item.cost, [ownedKey]: newOwned,
        [type === 'weapon' ? 'weapon' : 'armor']: item.id,
      };
    });
    showMsg(`${item.name} を そうび！`);
  };

  const equip = (type, item) => {
    setGameState(gs => ({ ...gs, [type === 'weapon' ? 'weapon' : 'armor']: item.id }));
    showMsg(`${item.name} に かえた！`);
  };

  const renderItem = (type, items, owned, equipped) => items.map(item => {
    const isOwned = owned.includes(item.id);
    const isEquipped = equipped === item.id;
    return (
      <div key={item.id} style={{
        display:'flex', alignItems:'center', gap:14, padding:'14px 18px', borderRadius:14,
        background: isEquipped ? 'linear-gradient(90deg,#E8F5E9,#F1F8E9)' : 'white',
        border: isEquipped ? '2px solid #4CAF50' : '2px solid #EEEEEE',
        marginBottom:10, transition:'all 0.15s',
      }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:17, fontWeight:900, color:'#1A237E' }}>
            {type==='weapon' ? '⚔️' : '🛡️'} {item.name}
          </div>
          <div style={{ fontSize:13, color:'#78909C', marginTop:2 }}>{item.desc}</div>
        </div>
        {isEquipped ? (
          <div style={{ padding:'6px 16px', borderRadius:20, background:'#4CAF50', color:'white', fontSize:13, fontWeight:900 }}>そうびちゅう</div>
        ) : isOwned ? (
          <button onClick={() => equip(type, item)}
            style={{ padding:'8px 18px', borderRadius:10, border:'none', background:'#5BB8FF', color:'white', cursor:'pointer', fontSize:14, fontWeight:700 }}>
            そうびする
          </button>
        ) : (
          <button onClick={() => buy(type, item)}
            disabled={gameState.coins < item.cost}
            style={{ padding:'8px 18px', borderRadius:10, border:'none',
              background: gameState.coins >= item.cost ? '#FFD700' : '#E0E0E0',
              color: gameState.coins >= item.cost ? '#1A237E' : '#9E9E9E',
              cursor: gameState.coins >= item.cost ? 'pointer' : 'default', fontSize:14, fontWeight:900 }}>
            💰{item.cost} かう
          </button>
        )}
      </div>
    );
  });

  return (
    <div className="screen" style={{ background:'#FFF9E6', display:'flex', flexDirection:'column', fontFamily:"'Noto Sans JP',sans-serif" }}>
      {/* Header */}
      <div style={{ height:64, background:'linear-gradient(90deg,#1A237E,#283593)', display:'flex', alignItems:'center', padding:'0 28px', gap:16, boxShadow:'0 3px 12px rgba(0,0,0,0.25)' }}>
        <div style={{ fontSize:24, fontWeight:900, color:'white', flex:1 }}>🛒 ショップ</div>
        <div style={{ display:'flex', alignItems:'center', gap:8, background:'rgba(255,255,255,0.12)', borderRadius:12, padding:'8px 20px' }}>
          <span style={{ fontSize:22 }}>💰</span>
          <span style={{ fontSize:24, fontWeight:900, color:'#FFD700' }}>{gameState.coins}</span>
        </div>
        <button onClick={onClose} style={{ padding:'10px 22px', fontSize:16, fontWeight:700, background:'rgba(255,255,255,0.15)', color:'white', border:'none', borderRadius:12, cursor:'pointer' }}>
          ✕ とじる
        </button>
      </div>

      {/* Content */}
      <div style={{ flex:1, display:'flex', gap:0, overflow:'hidden' }}>
        {/* Character preview */}
        <div style={{ width:220, background:'linear-gradient(to bottom,#E8EAF6,#C5CAE9)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', padding:'20px 20px 30px', borderRight:'3px solid rgba(26,35,126,0.08)' }}>
          <div style={{ fontSize:14, color:'#5C6BC0', fontWeight:700, marginBottom:10 }}>プレビュー</div>
          <svg width={170} height={200} viewBox="0 0 120 160" style={{ overflow:'visible' }}>
            <StickFigure weapon={gameState.weapon} armor={gameState.armor} pose="idle"
              animStyle={{ animation:'idle-bob 2.5s ease-in-out infinite' }} />
          </svg>
        </div>

        {/* Items */}
        <div style={{ flex:1, padding:'24px 32px', overflowY:'auto' }}>
          <div style={{ fontSize:20, fontWeight:900, color:'#1A237E', marginBottom:16, display:'flex', alignItems:'center', gap:8 }}>
            <span>⚔️ こうげきそうび</span>
          </div>
          {renderItem('weapon', WEAPONS, gameState.ownedWeapons, gameState.weapon)}

          <div style={{ fontSize:20, fontWeight:900, color:'#1A237E', margin:'24px 0 16px', display:'flex', alignItems:'center', gap:8 }}>
            <span>🛡️ ぼうぎょそうび</span>
          </div>
          {renderItem('armor', ARMORS, gameState.ownedArmors, gameState.armor)}
        </div>
      </div>

      {/* Toast msg */}
      {msg && (
        <div key={msgKey} style={{ position:'absolute', bottom:30, left:'50%', transform:'translateX(-50%)',
          background:'#1A237E', color:'white', padding:'12px 28px', borderRadius:12, fontSize:18, fontWeight:700,
          boxShadow:'0 6px 20px rgba(0,0,0,0.3)', animation:'slide-up 0.25s ease-out' }}>
          {msg}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════
function App() {
  const [scale, setScale] = useState(1);
  const [gameState, setGameState] = useState(loadState());
  const [screen, setScreen] = useState('title');
  const [currentStageId, setCurrentStageId] = useState(null);
  const [battleResult, setBattleResult] = useState(null);

  useEffect(() => {
    const update = () => setScale(Math.min(window.innerWidth / 1280, window.innerHeight / 720));
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  useEffect(() => {
    try { localStorage.setItem('kba-v2', JSON.stringify(gameState)); } catch(e) {}
  }, [gameState]);

  const hasSave = gameState.maxUnlocked > 1 || Object.keys(gameState.progress).length > 0;

  const startGame = () => setScreen('worldmap');

  const selectStage = (id) => {
    setCurrentStageId(id);
    setScreen('battle');
  };

  const completeBattle = (result) => {
    const { accuracy, coins } = result;
    const starsGained = accuracy >= 95 ? 3 : accuracy >= 85 ? 2 : accuracy >= 70 ? 1 : 0;

    if (starsGained > 0) {
      setGameState(gs => {
        const prevStars = gs.progress[result.stageId] || 0;
        const newMax = Math.max(gs.maxUnlocked, result.stageId + 1);
        return {
          ...gs,
          coins: gs.coins + coins,
          progress: { ...gs.progress, [result.stageId]: Math.max(prevStars, starsGained) },
          maxUnlocked: Math.min(newMax, 18),
        };
      });
    }

    setBattleResult(result);
    setScreen('stageclear');
  };

  const goNext = () => {
    const nextId = currentStageId + 1;
    if (STAGES[nextId]) {
      setCurrentStageId(nextId);
      setScreen('battle');
    } else {
      setScreen('worldmap');
    }
  };

  const retryStage = () => {
    setScreen('battle');
  };

  const renderScreen = () => {
    switch (screen) {
      case 'title':
        return <TitleScreen onStart={startGame} onContinue={startGame} hasSave={hasSave} />;
      case 'worldmap':
        return <WorldMapScreen gameState={gameState} onSelectStage={selectStage} onOpenShop={() => setScreen('shop')} />;
      case 'battle':
        return currentStageId && STAGES[currentStageId]
          ? <BattleScreen stageId={currentStageId} gameState={gameState} onComplete={completeBattle} onEscape={() => setScreen('worldmap')} />
          : <WorldMapScreen gameState={gameState} onSelectStage={selectStage} onOpenShop={() => setScreen('shop')} />;
      case 'stageclear':
        return <StageClearScreen result={battleResult} gameState={gameState} onNext={goNext} onRetry={retryStage} onWorldMap={() => setScreen('worldmap')} />;
      case 'shop':
        return <ShopScreen gameState={gameState} setGameState={setGameState} onClose={() => setScreen('worldmap')} />;
      default:
        return null;
    }
  };

  return (
    <div style={{ width:'100vw', height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#0A0E1A' }}>
      <div style={{ width:1280, height:720, transform:`scale(${scale})`, transformOrigin:'center center', position:'relative', overflow:'hidden', borderRadius:4, boxShadow:'0 30px 80px rgba(0,0,0,0.6)' }}>
        {renderScreen()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
